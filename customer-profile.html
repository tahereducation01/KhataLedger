<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>KhataLedger - Profile</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <div class="app-container">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="back-btn" id="btn-back">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <h1 class="top-bar-title">Contact Profile</h1>
      <div class="top-bar-actions">
        <button class="icon-btn" id="btn-edit" title="Edit">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-avatar" id="profile-avatar">R</div>
      <p class="profile-name" id="profile-name">Customer Name</p>
      <p class="profile-phone" id="profile-phone">No phone added</p>
    </div>

    <!-- Action Buttons -->
    <div class="action-row d-flex flex-wrap">
      <button class="action-card" id="btn-call">
        <div class="action-card-icon" style="background:var(--green-light)">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--green)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <span class="action-card-label">Call</span>
      </button>
      <button class="action-card" id="btn-whatsapp">
        <div class="action-card-icon" style="background:#D1FAE5">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
          </svg>
        </div>
        <span class="action-card-label">WhatsApp</span>
      </button>
      <button class="action-card" id="btn-ledger-link">
        <div class="action-card-icon" style="background:var(--accent-light)">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <span class="action-card-label">Ledger</span>
      </button>
    </div>

    <!-- Contact Info -->
    <div class="info-section">
      <div class="info-row">
        <div class="info-icon" style="background:var(--accent-light)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <div>
          <p class="info-label">Name</p>
          <p class="info-value" id="info-name">—</p>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:var(--green-light)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--green)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <div>
          <p class="info-label">Phone</p>
          <p class="info-value" id="info-phone">—</p>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:var(--orange-light)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--orange)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <div>
          <p class="info-label">Address</p>
          <p class="info-value" id="info-address">—</p>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:var(--accent-light)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
          </svg>
        </div>
        <div style="flex:1">
          <p class="info-label">Type</p>
          <p class="info-value" id="info-type">Customer</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="type-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:var(--red-light)">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--red)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <div>
          <p class="info-label">Member Since</p>
          <p class="info-value" id="info-since">—</p>
        </div>
      </div>
    </div>

    <!-- Balance Summary -->
    <div style="margin:0 16px 12px">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-value text-red" id="stat-gave">₹0</div>
          <div class="stat-label">Total Gave</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-green" id="stat-got">₹0</div>
          <div class="stat-label">Total Got</div>
        </div>
      </div>
    </div>

    <!-- Delete Button -->
    <div style="margin:0 16px 32px">
      <button id="btn-delete"
        style="width:100%;padding:14px;background:var(--red-light);color:var(--red);border:2px solid var(--red);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">
        🗑️ Delete Contact
      </button>
    </div>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Edit Contact</h3>
      <div class="mb-3">
        <label class="form-label">Full Name *</label>
        <input type="text" id="edit-name" class="form-input">
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="edit-phone" class="form-input">
      </div>
      <div class="mb-4">
        <label class="form-label">Address</label>
        <input type="text" id="edit-address" class="form-input">
      </div>
      <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/customers.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    Auth.requireAuth();
    Settings.applyTheme();

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    let customer = null;

    function init() {
      customer = Customers.getById(id);
      if (!customer) { window.location.href = 'customers.html'; return; }
      renderProfile();
      setupEvents();
    }

    function renderProfile() {
      const currency = Settings.get().currency;
      document.getElementById('profile-avatar').textContent = customer.name.charAt(0).toUpperCase();
      document.getElementById('profile-avatar').className = 'profile-avatar avatar-' + customer.avatarColor;
      document.getElementById('profile-name').textContent = customer.name;
      document.getElementById('profile-phone').textContent = customer.phone || 'No phone added';
      document.getElementById('info-name').textContent = customer.name;
      document.getElementById('info-phone').textContent = customer.phone || '—';
      document.getElementById('info-address').textContent = customer.address || '—';
      document.getElementById('info-type').textContent = customer.type === 'supplier' ? 'Supplier' : 'Customer';
      document.getElementById('type-toggle').checked = customer.type === 'supplier';
      const d = new Date(customer.createdAt);
      document.getElementById('info-since').textContent = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

      // Stats
      const txns = Transactions.getByCustomer(id);
      let totalGave = 0, totalGot = 0;
      txns.forEach(t => {
        if (t.type === 'gave') totalGave += t.amount;
        else totalGot += t.amount;
      });
      document.getElementById('stat-gave').textContent = currency + totalGave.toLocaleString('en-IN', { minimumFractionDigits: 2 });
      document.getElementById('stat-got').textContent = currency + totalGot.toLocaleString('en-IN', { minimumFractionDigits: 2 });
    }

    function setupEvents() {
      document.getElementById('btn-back').addEventListener('click', () => window.location.href = 'customers.html');
      document.getElementById('btn-ledger-link').addEventListener('click', () => window.location.href = 'ledger.html?id=' + id);

      document.getElementById('btn-call').addEventListener('click', () => {
        if (customer.phone) window.open('tel:' + customer.phone);
        else showToast('No phone number saved', 'error');
      });

      document.getElementById('btn-whatsapp').addEventListener('click', () => {
        if (customer.phone) {
          const bal = Math.abs(customer.balance || 0);
          const currency = Settings.get().currency;
          const msg = `Hi ${customer.name}, your due is pending ${currency}${bal.toLocaleString('en-IN')}, kindly clear as soon as possible.`;
          const encodedMsg = encodeURIComponent(msg);
          window.open(`https://wa.me/${customer.phone.replace(/\D/g, '')}?text=${encodedMsg}`, '_blank');
        } else {
          showToast('No phone number saved', 'error');
        }
      });

      document.getElementById('btn-edit').addEventListener('click', () => {
        document.getElementById('edit-name').value = customer.name;
        document.getElementById('edit-phone').value = customer.phone || '';
        document.getElementById('edit-address').value = customer.address || '';
        document.getElementById('edit-modal').classList.add('show');
      });

      document.getElementById('type-toggle').addEventListener('change', function () {
        const newType = this.checked ? 'supplier' : 'customer';
        Customers.update(id, { type: newType });
        customer = Customers.getById(id);
        document.getElementById('info-type').textContent = newType === 'supplier' ? 'Supplier' : 'Customer';
        showToast('Type changed to ' + newType, 'success');
      });

      document.getElementById('btn-delete').addEventListener('click', () => {
        if (confirm('Delete ' + customer.name + '? All their transactions will also be deleted.')) {
          Customers.remove(id);
          showToast('Contact deleted', 'success');
          setTimeout(() => window.location.href = 'customers.html', 600);
        }
      });

      document.getElementById('edit-modal').addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('show');
      });
    }

    function saveEdit() {
      const name = document.getElementById('edit-name').value.trim();
      if (!name) { showToast('Name is required', 'error'); return; }
      Customers.update(id, {
        name,
        phone: document.getElementById('edit-phone').value.trim(),
        address: document.getElementById('edit-address').value.trim()
      });
      customer = Customers.getById(id);
      document.getElementById('edit-modal').classList.remove('show');
      renderProfile();
      showToast('Contact updated!', 'success');
    }

    init();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
