<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>KhataLedger - Customers</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <div class="app-container">

    <div class="top-bar">
      <div class="business-selector" onclick="showBusinessMenu()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5" />
        </svg>
        <span class="business-name" id="business-name">My Business</span>
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
      <div class="top-bar-actions">
        <button class="icon-btn" onclick="window.location.href='collection.html'" title="Collections">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </button>
        <button class="icon-btn" onclick="window.location.href='reports.html'" title="Reports">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        </button>
        <button class="icon-btn" onclick="window.location.href='settings.html'" title="Settings">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
    </div>

    <div class="summary-card row g-0" id="main-summary-card">
      <div class="summary-item col-4 text-center">
        <div class="summary-label">You Will Get</div>
        <div class="summary-amount" id="total-get">₹0.00</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item col-4 text-center">
        <div class="summary-label">You Will Give</div>
        <div class="summary-amount" id="total-give">₹0.00</div>
      </div>
    </div>

    <div class="tab-bar d-flex">
      <button class="tab-btn flex-fill active" id="tab-customers" onclick="switchTab('customer')">
        Customers
      </button>
      <button class="tab-btn flex-fill" id="tab-suppliers" onclick="switchTab('supplier')">
        Suppliers
      </button>
      <button class="tab-btn flex-fill" id="tab-catalog" onclick="switchTab('catalog')">
        My Catalog
      </button>
    </div>

    <div class="ad-carousel-container" id="supplier-ads-container">
      <div class="ad-carousel-title">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
        </svg>
        Wholesale Offers
      </div>
      <div class="ad-carousel" id="supplier-ads-list"></div>
    </div>

    <div class="search-container" id="main-search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by name or phone...">
      </div>
    </div>

    <div class="filter-chips d-flex gap-2" id="main-filter-chips">
      <button class="chip flex-shrink-0 active" onclick="setFilter('all', this)">All</button>
      <button class="chip flex-shrink-0" onclick="setFilter('pending', this)">Pending</button>
      <button class="chip flex-shrink-0" onclick="setFilter('toget', this)">To Get</button>
      <button class="chip flex-shrink-0" onclick="setFilter('togive', this)">To Give</button>
      <button class="chip flex-shrink-0" onclick="setFilter('settled', this)">Settled</button>
    </div>

    <div id="contact-list" class="pb-action"></div>

    <div id="catalog-list" class="pb-action" style="display: none; padding: 12px 16px;"></div>

    <button class="fab" id="voice-btn" title="Voice Entry" style="bottom: 96px; background: var(--green);">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      </svg>
    </button>
    
    <div class="voice-result" id="voice-result"
      style="position:fixed; bottom: 170px; left: 16px; right: 16px; z-index: 1000; box-shadow: var(--shadow-lg);">
    </div>

    <button class="fab" id="main-fab" onclick="openAddModal()" title="Add New">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
    </button>

  </div>

  <div class="modal-overlay" id="add-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Add New Contact</h3>
      <div class="auth-tabs mb-3">
        <button class="auth-tab active" id="type-customer" onclick="selectContactType('customer')">Customer</button>
        <button class="auth-tab" id="type-supplier" onclick="selectContactType('supplier')">Supplier</button>
      </div>
      <div class="mb-3">
        <label class="form-label">Full Name *</label>
        <input type="text" id="add-name" class="form-input" placeholder="Enter name">
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="add-phone" class="form-input" placeholder="Enter phone number">
      </div>
      <div class="mb-4">
        <label class="form-label">Address</label>
        <input type="text" id="add-address" class="form-input" placeholder="Enter address">
      </div>
      <button class="btn-primary" onclick="saveContact()">Add Contact</button>
    </div>
  </div>

  <div class="modal-overlay" id="add-product-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Add New Product</h3>
      <div class="mb-3">
        <label class="form-label">Product Name *</label>
        <input type="text" id="prod-name" class="form-input" placeholder="e.g. Premium Basmati Rice">
      </div>
      <div class="mb-3">
        <label class="form-label">Category</label>
        <input type="text" id="prod-category" class="form-input" placeholder="e.g. Groceries">
      </div>
      <div class="mb-3">
        <label class="form-label">Price (₹) *</label>
        <input type="number" id="prod-price" class="form-input" placeholder="0.00" min="0" step="1">
      </div>
      <div class="mb-4">
        <label class="form-label">Product Image</label>
        <input type="file" id="prod-image-input" accept="image/*" class="form-input" style="padding: 9px; font-size: 13px;">
        <div id="prod-image-preview-container" style="display:none; position:relative; margin-top:12px;">
          <img id="prod-image-preview" src="" style="width:80px; height:80px; object-fit:cover; border-radius:12px; border:2px solid var(--border-color);">
          <button onclick="clearProductImage()" style="position:absolute; top:-8px; left:65px; background:var(--red); color:white; border:none; border-radius:50%; width:24px; height:24px; font-weight:bold; cursor:pointer;">×</button>
        </div>
      </div>
      <button class="btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>

  <div class="modal-overlay" id="business-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Business</h3>
      <div class="mb-3">
        <label class="form-label">Business Name</label>
        <input type="text" id="business-input" class="form-input" placeholder="Your business name">
      </div>
      <button class="btn-primary mb-3" onclick="saveBusiness()">Save</button>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-google" style="flex:1" onclick="window.location.href='settings.html'">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </button>
        <button class="btn-google" style="flex:1;color:var(--red);border-color:var(--red)" onclick="Auth.logout()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/customers.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/voice.js"></script>

  <script>
    // Embedded Products module to ensure catalog works immediately

    // Mock Ad Data 
    const DUMMY_ADS = [
      {
        id: 'ad_1', supplierName: 'Yusufi Hardware', productName: 'Bulk Smartwatches - 40% Margin',
        imageUrl: 'https://images.unsplash.com/photo-1579586337278-3befd40fd17a?auto=format&fit=crop&w=150&q=80', phone: '+91 7767952949'
      },
      {
        id: 'ad_2', supplierName: 'A1 Distributors', productName: 'Premium Basmati Rice (50kg Bags)',
        imageUrl: 'https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=150&q=80', phone: '919876543211'
      }
    ];

    function loadSupplierAds() {
      const user = Auth.getCurrentUser();
      const adContainer = document.getElementById('supplier-ads-container');
      if ((user && user.plan !== 'basic') || currentTab === 'catalog') {
        adContainer.style.display = 'none';
        return;
      }
      adContainer.style.display = 'block';
      const adList = document.getElementById('supplier-ads-list');
      let html = '';
      DUMMY_ADS.forEach(ad => {
        const msg = encodeURIComponent(`Hi ${ad.supplierName}, I saw your ad for "${ad.productName}" on KhataLedger. I am interested in buying in bulk.`);
        const waLink = `https://wa.me/${ad.phone.replace(/\D/g, '')}?text=${msg}`;
        html += `
        <a href="${waLink}" target="_blank" class="ad-card">
          <div class="ad-image-wrap"><img src="${ad.imageUrl}" alt="${ad.productName}" class="ad-image" loading="lazy"></div>
          <div class="ad-content">
            <div><p class="ad-supplier">${ad.supplierName}</p><p class="ad-product">${ad.productName}</p></div>
            <div class="ad-cta">Message Supplier</div>
          </div>
        </a>`;
      });
      adList.innerHTML = html;
    }

    Auth.requireAuth();
    Settings.applyTheme();

    let currentTab = 'customer';
    let currentFilter = 'all';
    let newContactType = 'customer';
    let currentProdImageBase64 = null;

    window.triggerAutoSMS = function (customer, amount, type, note) {
      if (!customer.phone) return;
      const currency = Settings.get().currency;
      const bizName = Auth.getCurrentUser().business || 'us';
      const action = type === 'gave' ? 'Given to you' : 'Received from you';
      const msg = `Transaction Alert: ${currency}${amount} has been ${action}.\nNote: ${note || 'N/A'}\nNet Balance: ${currency}${Math.abs(customer.balance || 0)}\n- ${bizName}`;
      const encodedMsg = encodeURIComponent(msg);
      const separator = /ipad|iphone|ipod/.test(navigator.userAgent.toLowerCase()) ? '&' : '?';
      window.open(`sms:${customer.phone}${separator}body=${encodedMsg}`, '_blank');
    };

    function init() {
      const user = Auth.getCurrentUser();
      const settings = Settings.get();
      document.getElementById('business-name').textContent = user?.business || settings.businessName || 'My Business';
      renderList();
      updateSummary();
      Voice.init();
      loadSupplierAds();
      document.getElementById('search-input').addEventListener('input', renderList);
    }

    document.addEventListener('voiceEntry', (e) => {
      const { amount, type, note, customer } = e.detail;
      if (customer && amount && type) {
        Transactions.add({
          customerId: customer.id, type: type, amount: amount, note: note, date: new Date().toISOString().split('T')[0]
        });
        showToast(`Saved ₹${amount} for ${customer.name}`, 'success');
        triggerAutoSMS(Customers.getById(customer.id), amount, type, note);
        renderList();
        updateSummary();
      }
    });

    function switchTab(type) {
      currentTab = type;
      document.getElementById('tab-customers').classList.toggle('active', type === 'customer');
      document.getElementById('tab-suppliers').classList.toggle('active', type === 'supplier');
      document.getElementById('tab-catalog').classList.toggle('active', type === 'catalog');

      if (type === 'catalog') {
        document.getElementById('contact-list').style.display = 'none';
        document.getElementById('catalog-list').style.display = 'block';
        document.getElementById('main-search-bar').style.display = 'none';
        document.getElementById('main-filter-chips').style.display = 'none';
        document.getElementById('main-summary-card').style.display = 'none';
        document.getElementById('voice-btn').style.display = 'none';
        document.getElementById('supplier-ads-container').style.display = 'none';
        document.getElementById('main-fab').onclick = openAddProductModal;
        renderCatalog();
      } else {
        document.getElementById('contact-list').style.display = 'block';
        document.getElementById('catalog-list').style.display = 'none';
        document.getElementById('main-search-bar').style.display = 'block';
        document.getElementById('main-filter-chips').style.display = 'flex';
        document.getElementById('main-summary-card').style.display = 'flex';
        document.getElementById('voice-btn').style.display = 'flex';
        document.getElementById('main-fab').onclick = openAddModal;
        loadSupplierAds();
        renderList();
      }
    }

    // --- Product Catalog Logic ---
    function openAddProductModal() {
      document.getElementById('prod-name').value = '';
      document.getElementById('prod-category').value = '';
      document.getElementById('prod-price').value = '';
      clearProductImage();
      document.getElementById('add-product-modal').classList.add('show');
    }

    function clearProductImage() {
      currentProdImageBase64 = null;
      document.getElementById('prod-image-input').value = '';
      document.getElementById('prod-image-preview-container').style.display = 'none';
    }

    document.getElementById('prod-image-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 500;
          const scaleSize = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
          canvas.width = img.width * scaleSize;
          canvas.height = img.height * scaleSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          currentProdImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
          document.getElementById('prod-image-preview').src = currentProdImageBase64;
          document.getElementById('prod-image-preview-container').style.display = 'block';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function saveProduct() {
      const name = document.getElementById('prod-name').value;
      const category = document.getElementById('prod-category').value;
      const price = document.getElementById('prod-price').value;

      if (!name || !price) {
        showToast('Product Name and Price are required', 'error');
        return;
      }
      Products.add({ name, category, price, img: currentProdImageBase64 });
      document.getElementById('add-product-modal').classList.remove('show');
      showToast('Product added to catalog!', 'success');
      renderCatalog();
    }

    function renderCatalog() {
      const container = document.getElementById('catalog-list');
      const products = Products.getAll();
      const currency = Settings.get().currency;

      if (products.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <p class="empty-title">Your catalog is empty</p>
            <p class="empty-desc">Tap the + button to add your first product</p>
          </div>`;
        return;
      }

      let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
      products.forEach(p => {
        const imgSrc = p.img || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="%23ccc"><rect width="100" height="100" fill="%23f3f4f6"/><text x="50" y="55" font-family="Arial" font-size="12" fill="%239ca3af" text-anchor="middle">No Image</text></svg>';
        html += `
          <div style="display: flex; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; box-shadow: var(--shadow); position: relative;">
            <img src="${imgSrc}" style="width: 76px; height: 76px; object-fit: cover; border-radius: 8px; margin-right: 12px; background: var(--bg-secondary);">
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
              <p style="margin: 0 0 4px; font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.2;">${p.name}</p>
              <span style="font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">${p.category}</span>
              <span style="font-size: 16px; font-weight: 800; color: var(--green);">${currency}${p.price.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
            </div>
            <button onclick="deleteProduct('${p.id}')" style="position: absolute; top: 12px; right: 12px; background: var(--red-light); border: none; color: var(--red); padding: 6px; border-radius: 8px; cursor: pointer;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function deleteProduct(id) {
      if (confirm('Delete this product from your catalog?')) {
        Products.remove(id);
        renderCatalog();
        showToast('Product deleted', 'success');
      }
    }

    // --- Contact List Logic ---
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const query = document.getElementById('search-input').value;
      const currency = Settings.get().currency;
      let contacts = Customers.search(query, currentTab);

      if (currentFilter === 'pending') contacts = contacts.filter(c => (c.balance || 0) !== 0);
      else if (currentFilter === 'toget') contacts = contacts.filter(c => (c.balance || 0) > 0);
      else if (currentFilter === 'togive') contacts = contacts.filter(c => (c.balance || 0) < 0);
      else if (currentFilter === 'settled') contacts = contacts.filter(c => (c.balance || 0) === 0);

      const container = document.getElementById('contact-list');

      if (contacts.length === 0) {
        container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${currentTab === 'customer' ? '👥' : '🏪'}</div>
          <p class="empty-title">No ${currentTab}s found</p>
          <p class="empty-desc">Tap the + button to add your first ${currentTab}</p>
        </div>`;
        return;
      }

      contacts.sort((a, b) => Math.abs(b.balance || 0) - Math.abs(a.balance || 0));

      const groups = {};
      contacts.forEach(c => {
        const letter = c.name.charAt(0).toUpperCase();
        if (!groups[letter]) groups[letter] = [];
        groups[letter].push(c);
      });

      let html = '';
      Object.keys(groups).sort().forEach(letter => {
        html += `<div class="list-section-label">${letter}</div>`;
        groups[letter].forEach(c => {
          const bal = c.balance || 0;
          const absBal = Math.abs(bal);
          const balClass = bal > 0 ? 'balance-green' : bal < 0 ? 'balance-red' : 'balance-zero';
          const balLabel = bal > 0 ? 'will get' : bal < 0 ? 'will give' : 'settled';
          const balText = bal === 0 ? 'Settled' : currency + absBal.toLocaleString('en-IN', { minimumFractionDigits: 2 });
          const txns = Transactions.getByCustomer(c.id);
          const lastTxn = txns.length > 0 ? timeAgo(txns[txns.length - 1].date, txns[txns.length - 1].time) : 'No transactions';

          html += `
          <a class="contact-item d-flex align-items-center" href="ledger.html?id=${c.id}">
            <div class="contact-avatar avatar-${c.avatarColor}">${c.name.charAt(0).toUpperCase()}</div>
            <div class="contact-info">
              <p class="contact-name">${c.name}</p>
              <p class="contact-meta">${lastTxn}${c.phone ? ' · ' + c.phone : ''}</p>
            </div>
            <div class="contact-balance">
              <span class="balance-amount ${balClass}">${balText}</span>
              <span class="balance-label ${balClass}">${balLabel}</span>
            </div>
          </a>`;
        });
      });
      container.innerHTML = html;
    }

    function updateSummary() {
      const all = Customers.getAll();
      const currency = Settings.get().currency;
      let totalGet = 0, totalGive = 0;
      all.forEach(c => {
        const b = c.balance || 0;
        if (b > 0) totalGet += b;
        else if (b < 0) totalGive += Math.abs(b);
      });
      document.getElementById('total-get').textContent = currency + totalGet.toLocaleString('en-IN', { minimumFractionDigits: 2 });
      document.getElementById('total-give').textContent = currency + totalGive.toLocaleString('en-IN', { minimumFractionDigits: 2 });
    }

    function openAddModal() {
      document.getElementById('add-name').value = '';
      document.getElementById('add-phone').value = '';
      document.getElementById('add-address').value = '';
      selectContactType(currentTab);
      document.getElementById('add-modal').classList.add('show');
      setTimeout(() => document.getElementById('add-name').focus(), 200);
    }

    function selectContactType(type) {
      newContactType = type;
      document.getElementById('type-customer').classList.toggle('active', type === 'customer');
      document.getElementById('type-supplier').classList.toggle('active', type === 'supplier');
    }

    function saveContact() {
      const name = document.getElementById('add-name').value;
      if (!name || name.trim().length < 2) { showToast('Please enter a valid name', 'error'); return; }
      const contact = Customers.add({
        name, phone: document.getElementById('add-phone').value, address: document.getElementById('add-address').value, type: newContactType
      });
      document.getElementById('add-modal').classList.remove('show');
      renderList();
      updateSummary();
      showToast(newContactType === 'customer' ? 'Customer added!' : 'Supplier added!', 'success');
      setTimeout(() => window.location.href = 'ledger.html?id=' + contact.id, 500);
    }

    function showBusinessMenu() {
      const user = Auth.getCurrentUser();
      document.getElementById('business-input').value = user?.business || '';
      document.getElementById('business-modal').classList.add('show');
    }

    function saveBusiness() {
      const name = document.getElementById('business-input').value.trim();
      if (!name) { showToast('Please enter a name', 'error'); return; }
      Auth.updateBusiness(name);
      Settings.set({ businessName: name });
      document.getElementById('business-name').textContent = name;
      document.getElementById('business-modal').classList.remove('show');
      showToast('Business name updated!', 'success');
    }

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', function (e) {
        if (e.target === this) this.classList.remove('show');
      });
    });

    init();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
