<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>KhataLedger - Settings</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <div class="app-container">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="back-btn" id="btn-back">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <h1 class="top-bar-title">Settings</h1>
      <div class="top-bar-actions"></div>
    </div>

    <!-- User Profile -->
    <div
      style="background:var(--bg-card);margin:12px 16px;border-radius:16px;padding:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px">
      <div
        style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white"
        id="user-avatar">U</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <p style="margin:0;font-size:17px;font-weight:700;color:var(--text-primary)" id="user-name">User</p>
          <span id="user-plan-badge"
            style="font-size:10px;font-weight:800;padding:2px 8px;border-radius:12px;background:var(--border-color);color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;">BASIC</span>
        </div>
        <p style="margin:0;font-size:13px;color:var(--text-muted)" id="user-email">email@example.com</p>
      </div>
    </div>
    <div class="settings-section">
      <p class="section-title">Subscription</p>
      <div class="settings-card">
        <div class="settings-row" onclick="window.location.href='subscription.html'">
          <div class="settings-icon" style="background:var(--orange-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--orange)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <span class="settings-label" id="upgrade-text" style="font-weight:700;">Upgrade to Pro ✨</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="var(--text-muted)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
      </div>
    </div>

    <!-- Appearance Section -->
    <div class="settings-section">
      <p class="section-title">Appearance</p>
      <div class="settings-card">
        <div class="settings-row" style="cursor:default">
          <div class="settings-icon" style="background:var(--accent-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </div>
          <span class="settings-label">Dark Mode</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Business Section -->
    <div class="settings-section">
      <p class="section-title">Business</p>
      <div class="settings-card">
        <div style="padding:14px 16px">
          <label class="form-label">Business Name</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="business-name-input" class="form-input" placeholder="Your Business Name"
              style="flex:1">
            <button id="save-business"
              style="padding:11px 16px;background:var(--accent);color:white;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap">Save</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Currency Section -->
    <div class="settings-section">
      <p class="section-title">Currency</p>
      <div class="settings-card">
        <div style="padding:14px 16px">
          <label class="form-label">Select Currency</label>
          <select id="currency-select" class="form-input">
            <option value="₹">₹ Indian Rupee (INR)</option>
            <option value="$">$ US Dollar (USD)</option>
            <option value="€">€ Euro (EUR)</option>
            <option value="£">£ British Pound (GBP)</option>
            <option value="৳">৳ Bangladeshi Taka (BDT)</option>
            <option value="Rs">Rs Pakistani Rupee (PKR)</option>
            <option value="රු">රු Sri Lankan Rupee (LKR)</option>
            <option value="Rp">Rp Indonesian Rupiah (IDR)</option>
            <option value="₦">₦ Nigerian Naira (NGN)</option>
            <option value="KES">KES Kenyan Shilling</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Data Management -->
    <div class="settings-section">
      <p class="section-title">Data</p>
      <div class="settings-card">
        <div class="settings-row" onclick="exportData()">
          <div class="settings-icon" style="background:var(--green-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--green)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
          </div>
          <span class="settings-label">Export Data (JSON)</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="var(--text-muted)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
        <div class="settings-row" onclick="showReminders()">
          <div class="settings-icon" style="background:var(--orange-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--orange)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          </div>
          <span class="settings-label">Reminder History</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="var(--text-muted)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
        <div class="settings-row" id="btn-clear-data">
          <div class="settings-icon" style="background:var(--red-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--red)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </div>
          <span class="settings-label" style="color:var(--red)">Clear All Data</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="var(--text-muted)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
      </div>
    </div>

    <!-- About -->
    <div class="settings-section">
      <p class="section-title">About</p>
      <div class="settings-card">
        <div class="settings-row" style="cursor:default">
          <div class="settings-icon" style="background:var(--accent-light)">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--accent)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <span class="settings-label">KhataLedger v1.0.0</span>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <div style="margin:0 16px 32px">
      <button id="btn-logout"
        style="width:100%;padding:14px;background:var(--red-light);color:var(--red);border:2px solid var(--red);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">
        Logout
      </button>
    </div>

  </div>

  <!-- Reminder History Modal -->
  <div class="modal-overlay" id="reminders-modal">
    <div class="modal-sheet" style="max-height:80vh;overflow-y:auto">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Reminder History</h3>
      <div id="reminders-list"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/customers.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/settings.js"></script>
  <script>
    SettingsPage.init();

    function exportData() {
      const txns = Transactions.getAll();
      const customers = Customers.getAll();

      if (txns.length === 0) {
        showToast('No transactions to export', 'error');
        return;
      }

      // 1. Build CSV Header
      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Date,Time,Customer Name,Transaction Type,Amount,Note\n";

      // 2. Build rows mapping transactions to customer names
      txns.forEach(t => {
        const cust = customers.find(c => c.id === t.customerId);
        // Sanitize commas to prevent breaking the CSV formatting
        const custName = cust ? cust.name.replace(/,/g, '') : 'Unknown';
        const typeStr = t.type === 'gave' ? 'You Gave' : 'You Got';
        const noteStr = t.note ? t.note.replace(/,/g, ' ') : '';

        const row = `${t.date},${t.time},${custName},${typeStr},${t.amount},${noteStr}`;
        csvContent += row + "\n";
      });

      // 3. Trigger Download
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      // Name the file dynamically based on the date
      link.setAttribute("download", `KhataLedger_Export_${new Date().toISOString().split('T')[0]}.csv`);

      document.body.appendChild(link); // Required for Firefox
      link.click();
      document.body.removeChild(link);

      showToast('Data exported successfully to Excel/CSV!', 'success');
    }

    function showReminders() {
      const reminders = Reminders.getAll().sort((a, b) => new Date(b.sentAt) - new Date(a.sentAt));
      const container = document.getElementById('reminders-list');

      if (reminders.length === 0) {
        container.innerHTML = `<div class="empty-state" style="padding:24px"><div class="empty-icon">🔔</div><p class="empty-title">No reminders sent yet</p></div>`;
      } else {
        container.innerHTML = reminders.map(r => {
          const d = new Date(r.sentAt);
          return `
          <div class="reminder-card">
            <div class="reminder-header">
              <span class="reminder-name">${r.customerName}</span>
              <span class="reminder-badge badge-sent">Sent</span>
            </div>
            <p class="reminder-msg">${r.message}</p>
            <p class="reminder-date">${d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
          </div>`;
        }).join('');
      }

      document.getElementById('reminders-modal').classList.add('show');
    }

    document.getElementById('reminders-modal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove('show');
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
