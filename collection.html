<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>KhataLedger - Collection</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app-container">

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="back-btn" id="btn-back">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="top-bar-title">Collections</h1>
    <div class="top-bar-actions">
      <button class="icon-btn" onclick="window.location.href='customers.html'">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-card">
    <div class="summary-item">
      <div class="summary-label">Total Pending</div>
      <div class="summary-amount" id="total-pending">₹0.00</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-label">Customers</div>
      <div class="summary-amount" id="count-pending">0</div>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="setTab('all', this)">All</button>
    <button class="tab-btn" onclick="setTab('overdue', this)">Overdue</button>
    <button class="tab-btn" onclick="setTab('today', this)">Today</button>
    <button class="tab-btn" onclick="setTab('upcoming', this)">Upcoming</button>
  </div>

  <!-- Collection List -->
  <div id="collection-list" style="padding:12px 16px">
    <!-- Rendered by JS -->
  </div>

</div>

<!-- Set Collection Date Modal -->
<div class="modal-overlay" id="date-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Set Collection Date</h3>
    <p style="text-align:center;color:var(--text-secondary);font-size:14px;margin-bottom:16px" id="modal-customer-name"></p>
    <div class="mb-4">
      <label class="form-label">Expected Payment Date</label>
      <input type="date" id="collection-date-input" class="form-input">
    </div>
    <button class="btn-primary" onclick="saveCollectionDate()">Set Date</button>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/customers.js"></script>
<script src="assets/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Settings.applyTheme();

  const COLL_DATES_KEY = 'ledger_collection_dates';
  let currentFilter = 'all';
  let selectedCustomerId = null;

  function getCollDates() {
    return JSON.parse(localStorage.getItem(COLL_DATES_KEY) || '{}');
  }

  function saveCollDates(d) {
    localStorage.setItem(COLL_DATES_KEY, JSON.stringify(d));
  }

  function init() {
    renderList();
  }

  function setTab(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const currency = Settings.get().currency;
    const today = new Date().toISOString().split('T')[0];
    const collDates = getCollDates();

    // Get all customers with pending balance (you will get = positive)
    let pending = Customers.getAll().filter(c => (c.balance || 0) > 0);

    let totalPending = 0;
    pending.forEach(c => totalPending += c.balance);
    document.getElementById('total-pending').textContent = currency + totalPending.toLocaleString('en-IN', { minimumFractionDigits: 2 });
    document.getElementById('count-pending').textContent = pending.length;

    // Apply filter
    if (currentFilter === 'overdue') {
      pending = pending.filter(c => {
        const d = collDates[c.id];
        return d && d < today;
      });
    } else if (currentFilter === 'today') {
      pending = pending.filter(c => collDates[c.id] === today);
    } else if (currentFilter === 'upcoming') {
      pending = pending.filter(c => {
        const d = collDates[c.id];
        return d && d > today;
      });
    }

    const container = document.getElementById('collection-list');

    if (pending.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎉</div>
          <p class="empty-title">No pending collections</p>
          <p class="empty-desc">All payments are settled!</p>
        </div>`;
      return;
    }

    // Sort by amount desc
    pending.sort((a, b) => (b.balance || 0) - (a.balance || 0));

    container.innerHTML = pending.map(c => {
      const d = collDates[c.id];
      let dateLabel = 'No date set';
      let dateBadge = '';

      if (d) {
        const dt = new Date(d);
        dateLabel = 'Expected: ' + dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        if (d < today) dateBadge = '<span style="font-size:11px;padding:2px 8px;background:var(--red-light);color:var(--red);border-radius:20px;font-weight:600;margin-left:8px">Overdue</span>';
        else if (d === today) dateBadge = '<span style="font-size:11px;padding:2px 8px;background:var(--orange-light);color:var(--orange);border-radius:20px;font-weight:600;margin-left:8px">Today</span>';
        else dateBadge = '<span style="font-size:11px;padding:2px 8px;background:var(--green-light);color:var(--green);border-radius:20px;font-weight:600;margin-left:8px">Upcoming</span>';
      }

      return `
        <div class="collection-card">
          <div class="coll-avatar avatar-${c.avatarColor}">${c.name.charAt(0).toUpperCase()}</div>
          <div class="coll-info" onclick="window.location.href='ledger.html?id=${c.id}'" style="cursor:pointer">
            <p class="coll-name">${c.name}${dateBadge}</p>
            <p class="coll-date">${dateLabel}${c.phone ? ' · ' + c.phone : ''}</p>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <span class="coll-amount">${currency}${(c.balance || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
            <button class="set-date-btn" onclick="openDateModal('${c.id}', '${c.name}')">Set Date</button>
          </div>
        </div>`;
    }).join('');
  }

  function openDateModal(custId, custName) {
    selectedCustomerId = custId;
    const collDates = getCollDates();
    document.getElementById('modal-customer-name').textContent = 'Customer: ' + custName;
    document.getElementById('collection-date-input').value = collDates[custId] || new Date().toISOString().split('T')[0];
    document.getElementById('date-modal').classList.add('show');
  }

  function saveCollectionDate() {
    const date = document.getElementById('collection-date-input').value;
    if (!date) { showToast('Please select a date', 'error'); return; }
    const d = getCollDates();
    d[selectedCustomerId] = date;
    saveCollDates(d);
    document.getElementById('date-modal').classList.remove('show');
    renderList();
    showToast('Collection date set!', 'success');
  }

  document.getElementById('btn-back').addEventListener('click', () => history.back());
  document.getElementById('date-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });

  init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
