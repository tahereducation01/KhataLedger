<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>KhataLedger - Reports</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app-container">

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="back-btn" id="btn-back" onclick="history.back()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="top-bar-title">Reports & Analytics</h1>
    <div class="top-bar-actions"></div>
  </div>

  <div style="padding:12px 16px">

    <!-- Stat Cards Row 1 -->
    <div class="stat-row d-flex">
      <div class="stat-card">
        <div class="stat-value text-red" id="stat-total-gave">₹0</div>
        <div class="stat-label">Total Gave</div>
      </div>
      <div class="stat-card">
        <div class="stat-value text-green" id="stat-total-got">₹0</div>
        <div class="stat-label">Total Got</div>
      </div>
    </div>

    <!-- Stat Cards Row 2 -->
    <div class="stat-row d-flex">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--accent)" id="stat-net-balance">₹0</div>
        <div class="stat-label">Net Balance</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--orange)" id="stat-customers">0</div>
        <div class="stat-label">Contacts</div>
      </div>
    </div>

    <!-- Monthly Credit vs Debit Chart -->
    <div class="chart-card">
      <p class="chart-title">📊 Monthly Credit vs Debit</p>
      <canvas id="monthly-chart" height="200"></canvas>
    </div>

    <!-- Top Customers -->
    <div class="chart-card">
      <p class="chart-title">🏆 Top Customers by Balance</p>
      <div id="top-customers-list"></div>
    </div>

    <!-- Balance Trend -->
    <div class="chart-card" style="margin-bottom:32px">
      <p class="chart-title">📈 Business Balance Trend</p>
      <canvas id="balance-chart" height="200"></canvas>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/customers.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/reports.js"></script>
<script>
  ReportsPage.init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
